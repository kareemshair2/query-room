<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غرفة الاستعلامات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════════ */
:root {
  --bg:          #0a0f1e;
  --bg2:         #0f172a;
  --card:        #131c30;
  --card2:       #1a2540;
  --border:      #1e3050;
  --border2:     #253a5e;
  --accent:      #38bdf8;
  --accent2:     #0ea5e9;
  --gold:        #f59e0b;
  --gold2:       #fbbf24;
  --green:       #10b981;
  --red:         #ef4444;
  --text:        #e2e8f0;
  --text2:       #94a3b8;
  --text3:       #64748b;
  --success:     #10b981;
  --warning:     #f59e0b;
  --danger:      #ef4444;
  --purple:      #8b5cf6;
  --pink:        #ec4899;
  --radius:      14px;
  --radius-sm:   8px;
  --shadow:      0 4px 24px rgba(0,0,0,.4);
  --shadow-lg:   0 8px 48px rgba(0,0,0,.6);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  direction: rtl;
  overflow-x: hidden;
}

/* ══════════════════════════════════════════
   BACKGROUND GRID EFFECT
══════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(56,189,248,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  top: -50%; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 600px;
  background: radial-gradient(ellipse, rgba(56,189,248,.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.wrapper {
  position: relative; z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
.header {
  text-align: center;
  padding: 40px 20px 32px;
  margin-bottom: 8px;
}

.header-logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--accent2), #1d4ed8);
  border-radius: 20px;
  font-size: 32px;
  margin-bottom: 16px;
  box-shadow: 0 0 32px rgba(14,165,233,.35);
  animation: pulse-glow 3s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 32px rgba(14,165,233,.35); }
  50%       { box-shadow: 0 0 48px rgba(14,165,233,.55); }
}

.header h1 {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 900;
  background: linear-gradient(135deg, #e2e8f0 30%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.2;
  margin-bottom: 8px;
}

.header p {
  color: var(--text3);
  font-size: .95rem;
  font-weight: 500;
}

/* ══════════════════════════════════════════
   MODE TABS
══════════════════════════════════════════ */
.mode-tabs {
  display: flex;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px;
  margin-bottom: 24px;
}

.mode-tab {
  flex: 1;
  padding: 12px 16px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text2);
  font-family: 'Cairo', sans-serif;
  font-size: .95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.mode-tab.active {
  background: linear-gradient(135deg, var(--accent2), #1d4ed8);
  color: #fff;
  box-shadow: 0 2px 12px rgba(14,165,233,.35);
}

.mode-tab:not(.active):hover {
  background: var(--card2);
  color: var(--text);
}

/* ══════════════════════════════════════════
   SEARCH CARD
══════════════════════════════════════════ */
.search-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}

.search-card h2 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.search-row {
  display: flex;
  gap: 12px;
  align-items: stretch;
}

.input-wrap {
  flex: 1;
  position: relative;
}

.input-wrap .input-icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 1.1rem;
  pointer-events: none;
}

.national-id-input {
  width: 100%;
  height: 52px;
  background: var(--bg2);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 1.15rem;
  font-weight: 600;
  padding: 0 44px 0 16px;
  letter-spacing: 2px;
  direction: ltr;
  text-align: center;
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}

.national-id-input::placeholder {
  color: var(--text3);
  letter-spacing: 1px;
  font-size: 1rem;
}

.national-id-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(56,189,248,.15);
}

.search-btn {
  height: 52px;
  padding: 0 28px;
  background: linear-gradient(135deg, var(--accent2), #1d4ed8);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: transform .15s, box-shadow .15s;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(14,165,233,.3);
}

.search-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14,165,233,.4); }
.search-btn:active { transform: translateY(0); }
.search-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

/* ══════════════════════════════════════════
   AUTO REFRESH BAR
══════════════════════════════════════════ */
.refresh-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 16px;
  background: rgba(16,185,129,.08);
  border: 1px solid rgba(16,185,129,.2);
  border-radius: var(--radius-sm);
  margin-top: 14px;
  font-size: .85rem;
  color: var(--green);
}

.refresh-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  animation: blink 1.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.refresh-progress {
  flex: 1;
  height: 3px;
  background: rgba(16,185,129,.2);
  border-radius: 2px;
  overflow: hidden;
}
.refresh-fill {
  height: 100%;
  background: var(--green);
  border-radius: 2px;
  transition: width 1s linear;
}

/* ══════════════════════════════════════════
   STATE DISPLAYS
══════════════════════════════════════════ */
#stateBox { animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

.state-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.state-empty .emoji { font-size: 3rem; margin-bottom: 12px; }
.state-empty p { font-size: 1rem; }

.state-loading {
  text-align: center;
  padding: 60px 20px;
}
.spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-loading p { color: var(--text2); font-size: 1rem; }

.state-error {
  text-align: center;
  padding: 40px 20px;
  background: rgba(239,68,68,.08);
  border: 1px solid rgba(239,68,68,.25);
  border-radius: var(--radius);
}
.state-error .emoji { font-size: 2.5rem; margin-bottom: 10px; }
.state-error p { color: #fca5a5; font-size: 1rem; font-weight: 600; }

/* ══════════════════════════════════════════
   RESULTS
══════════════════════════════════════════ */
.results { animation: fadeIn .35s ease; }

/* ── Status Banner ── */
.status-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  padding: 18px 24px;
  border-radius: var(--radius);
  margin-bottom: 20px;
  border: 1px solid;
}
.status-banner.accepted {
  background: rgba(16,185,129,.1);
  border-color: rgba(16,185,129,.3);
}
.status-banner.pending {
  background: rgba(245,158,11,.1);
  border-color: rgba(245,158,11,.3);
}
.status-banner.rejected {
  background: rgba(239,68,68,.1);
  border-color: rgba(239,68,68,.3);
}

.status-label {
  font-size: 1.3rem;
  font-weight: 900;
}
.status-banner.accepted .status-label { color: var(--green); }
.status-banner.pending  .status-label { color: var(--gold); }
.status-banner.rejected .status-label { color: var(--red); }

.status-meta { font-size: .85rem; color: var(--text2); }

.print-btn {
  padding: 8px 16px;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-family: 'Cairo', sans-serif;
  font-size: .85rem;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.print-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Section Cards ── */
.section-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}

.section-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}

.section-card h3 {
  font-size: .85rem;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.section-card h3 .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.info-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 14px;
}
.info-row:last-child { margin-bottom: 0; }

.info-label {
  font-size: .78rem;
  color: var(--text3);
  font-weight: 600;
}

.info-value {
  font-size: .97rem;
  color: var(--text);
  font-weight: 600;
  line-height: 1.5;
}

.info-value.big {
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--accent);
}

.info-value.phone {
  direction: ltr;
  text-align: right;
  font-size: 1rem;
  letter-spacing: 1px;
}

.badge-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 100px;
  font-size: .78rem;
  font-weight: 700;
}

.badge-emergency {
  background: rgba(239,68,68,.15);
  color: #fca5a5;
  border: 1px solid rgba(239,68,68,.3);
}

/* ── Interventions ── */
.interventions-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}

.interventions-section h3 {
  font-size: .85rem;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.int-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}

.int-item {
  padding: 14px 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid;
  transition: transform .15s;
  position: relative;
  overflow: hidden;
}

.int-item::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: .08;
}

.int-item.active {
  background: rgba(0,0,0,.2);
}

.int-item.inactive {
  border-color: var(--border) !important;
  opacity: .45;
}

.int-item.inactive .int-icon { filter: grayscale(1); }

.int-icon { font-size: 1.4rem; margin-bottom: 6px; display: block; }
.int-name { font-size: .82rem; font-weight: 700; color: var(--text); line-height: 1.3; }
.int-value {
  margin-top: 6px;
  font-size: .78rem;
  font-weight: 600;
  color: var(--text2);
  background: rgba(255,255,255,.06);
  border-radius: 4px;
  padding: 2px 6px;
  display: inline-block;
}

.int-check {
  position: absolute;
  top: 8px; left: 8px;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .65rem;
}

/* ── Notes Section ── */
.notes-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}

.notes-section h3 {
  font-size: .85rem;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.notes-block {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 12px;
}

.notes-block:last-child { margin-bottom: 0; }
.notes-block-label {
  font-size: .78rem;
  color: var(--text3);
  font-weight: 700;
  margin-bottom: 6px;
}
.notes-block-text {
  font-size: .9rem;
  color: var(--text);
  line-height: 1.7;
  white-space: pre-wrap;
}

/* ── Transfer Status ── */
.transfer-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.transfer-chip {
  flex: 1; min-width: 130px;
  padding: 12px;
  border-radius: var(--radius-sm);
  text-align: center;
  font-size: .82rem;
  font-weight: 700;
}

.transfer-chip.on {
  background: rgba(16,185,129,.12);
  border: 1px solid rgba(16,185,129,.3);
  color: var(--green);
}
.transfer-chip.off {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text3);
}

.transfer-chip .chip-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }

/* ── Executions Table ── */
.exec-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}

.exec-section h3 {
  font-size: .85rem;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.exec-table {
  width: 100%;
  border-collapse: collapse;
  font-size: .9rem;
}

.exec-table th {
  background: var(--bg2);
  color: var(--accent);
  font-weight: 700;
  font-size: .8rem;
  padding: 10px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.exec-table td {
  padding: 10px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-weight: 500;
}

.exec-table tr:last-child td { border-bottom: none; }
.exec-table tr:hover td { background: var(--primary-glow); }

.exec-empty {
  text-align: center;
  padding: 30px;
  color: var(--text3);
  font-size: .9rem;
}

.exec-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 100px;
  font-size: .78rem;
  font-weight: 700;
}

.exec-badge.done {
  background: rgba(16,185,129,.15);
  color: var(--green);
}

.exec-badge.pending {
  background: rgba(245,158,11,.15);
  color: var(--gold);
}

/* ══════════════════════════════════════════
   LAST UPDATED
══════════════════════════════════════════ */
.last-updated {
  text-align: center;
  font-size: .8rem;
  color: var(--text3);
  margin-top: 8px;
}

/* ══════════════════════════════════════════
   PRINT STYLES
══════════════════════════════════════════ */
@media print {
  body { background: white; color: black; }
  body::before, body::after { display: none; }
  .search-card, .mode-tabs, .refresh-bar, .print-btn { display: none !important; }
  .status-banner, .section-card, .interventions-section, .notes-section {
    border: 1px solid #ccc !important;
    background: white !important;
    box-shadow: none !important;
    break-inside: avoid;
  }
  .int-item.inactive { display: none; }
  * { color: black !important; }
}

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 24px 16px 12px;
  margin-top: 12px;
  border-top: 1px solid var(--border);
  font-size: .82rem;
  color: var(--text3);
  line-height: 1.8;
}
.footer strong { color: var(--accent); }
.footer .divider { color: var(--border); margin: 0 6px; }

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (max-width: 560px) {
  .search-row { flex-direction: column; }
  .int-grid { grid-template-columns: repeat(2, 1fr); }
  .section-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>
<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <img src="logo.jpg" alt="صناع الحياة" style="height:64px;width:auto;border-radius:12px;display:block;margin:0 auto 12px;box-shadow:0 0 20px rgba(14,165,233,.25);">
    <h1>غرفة الاستعلامات</h1>
    <p>أدخل رقمك القومي للاستعلام عن حالتك</p>
  </div>

  <!-- MODE TABS -->
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('self')" id="tab-self">
      👤 مستفيد – استعلم عن نفسك
    </button>
    <button class="mode-tab" onclick="setMode('staff')" id="tab-staff">
      🛡️ موظف – بحث عن مستفيد
    </button>
  </div>

  <!-- SEARCH CARD -->
  <div class="search-card">
    <h2 id="searchLabel">🪪 الرقم القومي</h2>
    <div class="search-row">
      <div class="input-wrap">
        <span class="input-icon">🔢</span>
        <input
          id="nationalIdInput"
          class="national-id-input"
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="14"
          placeholder="أدخل الرقم القومي المكون من 14 رقم"
          autocomplete="off"
        >
      </div>
      <button class="search-btn" id="searchBtn" onclick="doSearch()">
        <span>🔍</span> بحث
      </button>
    </div>

    <div class="refresh-bar">
      <div class="refresh-dot"></div>
      <span id="refreshText">سيتم تحديث البيانات تلقائياً كل دقيقتين</span>
      <div class="refresh-progress">
        <div class="refresh-fill" id="refreshFill" style="width:100%"></div>
      </div>
    </div>
  </div>

  <!-- STATE BOX -->
  <div id="stateBox">
    <div class="state-empty">
      <div class="emoji">🔎</div>
      <p>أدخل الرقم القومي للبحث عن بيانات المستفيد</p>
    </div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>

  <div class="footer">
    <strong>غرفة الاستعلامات</strong><span class="divider">|</span>إدارة الحالة — صناع الحياة المنوفية
    <br>
    تم التطوير بواسطة <strong>كريم شعير</strong><span class="divider">|</span>إدارة البيانات والتحول الرقمي
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════
//  ⚙️  الإعدادات — غير الـ URL بعد نشر Apps Script
// ══════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzB3i3uc3_jaf3N9yWXZpy32kJeNr40kO_qIzEO3h1EGDX2Vp-O10EbVli83FM1lMkCcg/exec';

// ── الوضع الحالي ────────────────────────────────────
let currentMode = 'self';
let lastSearchedId = '';
let refreshInterval = null;
let refreshCountdown = null;
const REFRESH_SECONDS = 120; // كل دقيقتين
let countdown = REFRESH_SECONDS;

// ── ألوان الـ interventions ─────────────────────────
const COLORS = {
  '#10b981': { bg:'rgba(16,185,129,.12)', border:'rgba(16,185,129,.35)', check:'rgba(16,185,129,.9)' },
  '#f59e0b': { bg:'rgba(245,158,11,.12)', border:'rgba(245,158,11,.35)', check:'rgba(245,158,11,.9)' },
  '#ef4444': { bg:'rgba(239,68,68,.12)',  border:'rgba(239,68,68,.35)',  check:'rgba(239,68,68,.9)'  },
  '#8b5cf6': { bg:'rgba(139,92,246,.12)', border:'rgba(139,92,246,.35)', check:'rgba(139,92,246,.9)' },
  '#3b82f6': { bg:'rgba(59,130,246,.12)', border:'rgba(59,130,246,.35)', check:'rgba(59,130,246,.9)' },
  '#ec4899': { bg:'rgba(236,72,153,.12)', border:'rgba(236,72,153,.35)', check:'rgba(236,72,153,.9)' },
  '#6366f1': { bg:'rgba(99,102,241,.12)', border:'rgba(99,102,241,.35)', check:'rgba(99,102,241,.9)' },
  '#14b8a6': { bg:'rgba(20,184,166,.12)', border:'rgba(20,184,166,.35)', check:'rgba(20,184,166,.9)' },
  '#f97316': { bg:'rgba(249,115,22,.12)', border:'rgba(249,115,22,.35)', check:'rgba(249,115,22,.9)' },
  '#84cc16': { bg:'rgba(132,204,22,.12)', border:'rgba(132,204,22,.35)', check:'rgba(132,204,22,.9)' },
};

// ══════════════════════════════════════════════════════
//  تبديل الوضع
// ══════════════════════════════════════════════════════
function setMode(mode) {
  currentMode = mode;
  document.getElementById('tab-self').classList.toggle('active', mode === 'self');
  document.getElementById('tab-staff').classList.toggle('active', mode === 'staff');
  document.getElementById('searchLabel').textContent =
    mode === 'self' ? '🪪 أدخل رقمك القومي' : '🔍 ابحث برقم المستفيد القومي';
}

// ══════════════════════════════════════════════════════
//  البحث
// ══════════════════════════════════════════════════════
function doSearch() {
  const id = document.getElementById('nationalIdInput').value.trim();
  if (!id) return flash('أدخل الرقم القومي أولاً');
  if (!/^\d{14}$/.test(id)) return flash('الرقم القومي يجب أن يكون 14 رقم بالضبط');

  lastSearchedId = id;
  fetchData(id);
  startAutoRefresh(id);
}

// تشغيل Enter بيبحث
document.getElementById('nationalIdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ══════════════════════════════════════════════════════
//  جلب البيانات
async function fetchData(nationalId, silent = false) {
  if (!silent) showLoading();
  try {
    const url = `${APPS_SCRIPT_URL}?action=search&id=${encodeURIComponent(nationalId)}`;
    const res  = await fetch(url);
    const json = await res.json();
    if (json.success) {
      renderResults(json.data, json.lastUpdated);
    } else {
      if (!silent) showError(json.message || 'لم يتم العثور على البيانات');
    }
  } catch (err) {
    if (!silent) showError('تعذّر الاتصال. تأكد من اتصالك بالإنترنت.');
  }
}

// ══════════════════════════════════════════════════════
//  التحديث التلقائي
// ══════════════════════════════════════════════════════
function startAutoRefresh(id) {
  clearInterval(refreshInterval);
  clearInterval(refreshCountdown);
  countdown = REFRESH_SECONDS;
  updateRefreshBar();

  refreshCountdown = setInterval(() => {
    countdown--;
    if (countdown <= 0) countdown = REFRESH_SECONDS;
    updateRefreshBar();
  }, 1000);

  refreshInterval = setInterval(() => {
    if (lastSearchedId) fetchData(lastSearchedId, true);
    countdown = REFRESH_SECONDS;
  }, REFRESH_SECONDS * 1000);
}

function updateRefreshBar() {
  const pct = (countdown / REFRESH_SECONDS) * 100;
  document.getElementById('refreshFill').style.width = pct + '%';
  const mins = Math.floor(countdown / 60);
  const secs = countdown % 60;
  document.getElementById('refreshText').textContent =
    `تحديث تلقائي — متبقي ${mins}:${String(secs).padStart(2,'0')}`;
}

// ══════════════════════════════════════════════════════
//  العرض
// ══════════════════════════════════════════════════════
function renderResults(data, lastUpdated) {
  const p  = data.personal;
  const iv = data.interventions || [];
  const ex = data.executions || [];

  const statusClass = getStatusClass(p.status);
  const statusEmoji = getStatusEmoji(p.status);

  const activeCount = iv.filter(i => i.active).length;

  let html = `
    <!-- STATUS BANNER -->
    <div class="status-banner ${statusClass}">
      <div>
        <div class="status-label">${statusEmoji} ${p.status || 'غير محدد'}</div>
        <div class="status-meta">تاريخ الزيارة: ${formatDate(p.dateOfVisit)} &nbsp;|&nbsp; المتطوع: ${p.volunteerName || '-'}</div>
      </div>
      <button class="print-btn" onclick="window.print()">🖨️ طباعة</button>
    </div>

    <!-- PERSONAL & ADDRESS -->
    <div class="section-grid">
      <!-- بيانات شخصية -->
      <div class="section-card">
        <h3><span class="dot" style="background:#38bdf8"></span> البيانات الشخصية</h3>

        <div class="info-row">
          <div class="info-label">الاسم</div>
          <div class="info-value big">${p.beneficiaryName || '-'}</div>
        </div>
        <div class="info-row">
          <div class="info-label">الرقم القومي</div>
          <div class="info-value phone">${p.nationalId || '-'}</div>
        </div>
        ${p.emergency && p.emergency !== 'none' && p.emergency !== 'FALSE' ? `
        <div class="field-row">
          <span class="label">الطوارئ:</span>
          <span class="badge badge-emergency">🚨 ${p.emergency}</span>
        </div>` : ''}
      </div>

      <!-- عنوان وأسرة -->
      <div class="section-card">
        <h3><span class="dot" style="background:#f59e0b"></span> العنوان والأسرة</h3>

        ${p.city ? `<div class="info-row">
          <div class="info-label">المركز</div>
          <div class="info-value">${p.city}</div>
        </div>` : ''}
        ${p.village ? `<div class="info-row">
          <div class="info-label">القرية</div>
          <div class="info-value">${p.village}</div>
        </div>` : ''}
        ${p.familyMembers ? `<div class="info-row">
          <div class="info-label">عدد أفراد الأسرة</div>
          <div class="info-value big">${p.familyMembers} أفراد</div>
        </div>` : ''}
      </div>
    </div>

    <!-- INTERVENTIONS -->
    <div class="interventions-section">
      <h3>
        <span class="dot" style="background:#10b981;display:inline-block;width:6px;height:6px;border-radius:50%;"></span>
        التدخلات المقدمة
        <span style="margin-right:auto;font-size:.8rem;color:#10b981;font-weight:700;">
          ${activeCount} تدخل متاح
        </span>
      </h3>
      <div class="int-grid">
        ${iv.map(item => renderIntervention(item)).join('')}
      </div>
    </div>

    <!-- EXECUTIONS -->
    <div class="exec-section">
      <h3><span class="dot" style="background:#f59e0b;display:inline-block;width:6px;height:6px;border-radius:50%;"></span> التنفيذات</h3>
      ${ex.length ? `
      <table class="exec-table">
        <thead>
          <tr>
            <th>#</th>
            <th>البند</th>
            <th>التاريخ</th>
            <th>القيمة</th>
            <th>تنفيذ</th>
          </tr>
        </thead>
        <tbody>
          ${ex.map((e, i) => `
          <tr>
            <td>${i + 1}</td>
            <td>${e.item || '-'}</td>
            <td>${e.date || '-'}</td>
            <td>${e.value || '-'}</td>
            <td><span class="exec-badge ${e.executed ? 'done' : 'pending'}">${e.executed ? '✅ تم' : '⏳ معلق'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>` : `<div class="exec-empty">لا توجد تنفيذات بعد</div>`}
    </div>

    <!-- NOTES -->
    ${(p.notes || p.notesReply) ? `
    <div class="notes-section">
      <h3><span class="dot" style="background:#8b5cf6;display:inline-block;width:6px;height:6px;border-radius:50%;"></span> الملاحظات</h3>
      ${p.notes ? `
      <div class="notes-block">
        <div class="notes-block-label">📝 الملاحظة</div>
        <div class="notes-block-text">${p.notes}</div>
      </div>` : ''}
      ${p.notesReply ? `
      <div class="notes-block">
        <div class="notes-block-label">💬 رد على الملاحظة</div>
        <div class="notes-block-text">${p.notesReply}</div>
      </div>` : ''}
    </div>` : ''}

    <!-- TRANSFER STATUS -->
    <div class="section-card">
      <h3><span class="dot" style="background:#6366f1;display:inline-block;width:6px;height:6px;border-radius:50%;"></span> مراحل التحويل</h3>
      <div class="transfer-row">
        ${transferChip('💰', 'تحويل للتمويل',    p.transferFinance)}
        ${transferChip('📦', 'بدء التجميع',      p.startCollection)}
        ${transferChip('⚙️', 'تحويل للتنفيذ',   p.transferExec)}
      </div>
    </div>
  `;

  document.getElementById('stateBox').innerHTML = `<div class="results">${html}</div>`;
  document.getElementById('lastUpdated').textContent =
    lastUpdated ? `آخر تحديث: ${lastUpdated}` : '';
}

// ── رسم تدخل واحد ─────────────────────────────────────
function renderIntervention(item) {
  const color  = item.color || '#64748b';
  const theme  = COLORS[color] || { bg:'rgba(100,116,139,.12)', border:'rgba(100,116,139,.35)', check:'gray' };
  const isOn   = item.active;

  return `
    <div class="int-item ${isOn ? 'active' : 'inactive'}"
         style="${isOn ? `border-color:${theme.border};background:${theme.bg}` : ''}">
      ${isOn ? `<div class="int-check" style="background:${theme.check};color:#fff">✓</div>` : ''}
      <span class="int-icon">${item.icon}</span>
      <div class="int-name">${item.name}</div>
      ${item.value ? `<div class="int-value">${item.value}</div>` : ''}
    </div>`;
}

// ── شريحة مرحلة ───────────────────────────────────────
function transferChip(icon, label, val) {
  const isOn = (val === true || String(val).toUpperCase() === 'TRUE');
  return `<div class="transfer-chip ${isOn ? 'on' : 'off'}">
    <span class="chip-icon">${icon}</span>
    ${label}
    ${isOn ? '<br><small>✅ تم</small>' : ''}
  </div>`;
}

// ══════════════════════════════════════════════════════
//  حالات العرض
// ══════════════════════════════════════════════════════
function showLoading() {
  document.getElementById('stateBox').innerHTML = `
    <div class="state-loading">
      <div class="spinner"></div>
      <p>جاري البحث في قاعدة البيانات...</p>
    </div>`;
  document.getElementById('lastUpdated').textContent = '';
}

function showError(msg) {
  document.getElementById('stateBox').innerHTML = `
    <div class="state-error">
      <div class="emoji">❌</div>
      <p>${msg}</p>
    </div>`;
}

function flash(msg) {
  const inp = document.getElementById('nationalIdInput');
  inp.style.borderColor = '#ef4444';
  inp.style.boxShadow   = '0 0 0 3px rgba(239,68,68,.2)';
  setTimeout(() => {
    inp.style.borderColor = '';
    inp.style.boxShadow   = '';
  }, 1500);
  // رسالة مؤقتة
  const old = document.getElementById('stateBox').innerHTML;
  document.getElementById('stateBox').innerHTML = `
    <div class="state-error" style="padding:20px;">
      <p>⚠️ ${msg}</p>
    </div>`;
  setTimeout(() => { document.getElementById('stateBox').innerHTML = old; }, 2500);
}

// ══════════════════════════════════════════════════════
//  مساعدات
// ══════════════════════════════════════════════════════
function getStatusClass(status) {
  if (!status) return 'pending';
  const s = String(status).trim();
  if (s === 'مقبول')  return 'accepted';
  if (s === 'مرفوض') return 'rejected';
  return 'pending';
}

function getStatusEmoji(status) {
  if (!status) return '⏳';
  const s = String(status).trim();
  if (s === 'مقبول')  return '✅';
  if (s === 'مرفوض') return '❌';
  return '⏳';
}

function formatDate(d) {
  if (!d) return '-';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });
}

// تفعيل زر البحث فقط لما يكون 14 رقم
document.getElementById('nationalIdInput').addEventListener('input', function() {
  const valid = /^\d{14}$/.test(this.value.trim());
  document.getElementById('searchBtn').disabled = !valid;
});
document.getElementById('searchBtn').disabled = true;
</script>
</body>
</html>
