<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غرفة الاستعلامات — إدارة الحالة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b1a;--bg2:#0c1530;--card:rgba(15,25,55,.75);--card2:rgba(20,35,70,.6);
  --border:rgba(56,189,248,.12);--border-hover:rgba(56,189,248,.3);
  --accent:#38bdf8;--accent2:#0ea5e9;--accent-glow:rgba(14,165,233,.25);
  --gold:#f59e0b;--gold2:#fbbf24;--green:#10b981;--red:#ef4444;--purple:#8b5cf6;--pink:#ec4899;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --radius:16px;--radius-sm:10px;--shadow:0 8px 40px rgba(0,0,0,.5);--shadow-lg:0 12px 60px rgba(0,0,0,.7);
}
body{
  font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  direction:rtl;overflow-x:hidden;
}
/* ── Animated Background ── */
.bg-canvas{
  position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}
.bg-canvas .orb{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:.08;animation:orbFloat 18s ease-in-out infinite;
}
.orb:nth-child(1){width:600px;height:600px;background:var(--accent2);top:-15%;left:-10%;animation-delay:0s}
.orb:nth-child(2){width:500px;height:500px;background:var(--purple);bottom:-20%;right:-8%;animation-delay:-6s}
.orb:nth-child(3){width:400px;height:400px;background:var(--pink);top:40%;left:30%;animation-delay:-12s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.05)}66%{transform:translate(-20px,40px) scale(.95)}}

/* ── Grid overlay ── */
.grid-overlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(56,189,248,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.02) 1px,transparent 1px);
  background-size:50px 50px;
}

/* ── Wrapper ── */
.wrapper{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:20px 16px 40px}

/* ── Header ── */
.header{text-align:center;padding:30px 20px 28px}
.header-logo{display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px}
.header-logo img{height:72px;width:auto;border-radius:16px;box-shadow:0 0 40px var(--accent-glow)}
.header h1{
  font-size:clamp(1.7rem,5vw,2.6rem);font-weight:900;line-height:1.2;margin-bottom:6px;
  background:linear-gradient(135deg,#f0f9ff 20%,var(--accent) 60%,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header p{color:var(--text3);font-size:.95rem;font-weight:500;letter-spacing:.5px}

/* ── Glass Card Base ── */
.glass{
  background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);transition:border-color .3s,box-shadow .3s;
}
.glass:hover{border-color:var(--border-hover);box-shadow:var(--shadow-lg)}

/* ── Mode Tabs ── */
.mode-tabs{display:flex;gap:8px;padding:6px;margin-bottom:24px}
.mode-tab{
  flex:1;padding:12px 16px;border:none;border-radius:var(--radius-sm);
  background:transparent;color:var(--text2);font-family:'Cairo',sans-serif;
  font-size:.92rem;font-weight:600;cursor:pointer;transition:all .25s;
  display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;
}
.mode-tab::before{
  content:'';position:absolute;inset:0;border-radius:var(--radius-sm);
  opacity:0;transition:opacity .3s;
}
.mode-tab.active{
  background:linear-gradient(135deg,rgba(14,165,233,.2),rgba(29,78,216,.15));
  color:#fff;border:1px solid rgba(56,189,248,.35);
  box-shadow:0 4px 24px rgba(14,165,233,.15),inset 0 1px 0 rgba(255,255,255,.06);
}
.mode-tab:not(.active):hover{background:var(--card2);color:var(--text)}

/* ── Search Card ── */
.search-card{padding:24px;margin-bottom:20px}
.search-card .search-label{
  font-size:.95rem;font-weight:700;color:var(--text2);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.search-row{display:flex;gap:10px;align-items:stretch}
.input-wrap{flex:1;position:relative}
.input-wrap .input-icon{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);
  font-size:1.1rem;pointer-events:none;z-index:2;
}
.national-id-input{
  width:100%;height:54px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:'Cairo',sans-serif;
  font-size:1.15rem;font-weight:600;padding:0 46px 0 16px;letter-spacing:2px;
  direction:ltr;text-align:center;transition:all .25s;outline:none;
}
.national-id-input::placeholder{color:var(--text3);letter-spacing:1px;font-size:.95rem;font-weight:500}
.national-id-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,.12),0 0 30px rgba(14,165,233,.06)}
.search-btn{
  height:54px;padding:0 32px;background:linear-gradient(135deg,var(--accent2),#2563eb,var(--accent2));
  background-size:200% 200%;border:none;border-radius:var(--radius-sm);color:#fff;
  font-family:'Cairo',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:all .25s;white-space:nowrap;
  box-shadow:0 4px 20px rgba(14,165,233,.3);position:relative;overflow:hidden;
  animation:gradientShift 4s ease-in-out infinite;
}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.search-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(14,165,233,.4)}
.search-btn:active{transform:translateY(0)}
.search-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;animation:none}

/* ── Refresh Bar ── */
.refresh-bar{
  display:flex;align-items:center;gap:10px;padding:8px 14px;margin-top:14px;
  background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);
  border-radius:var(--radius-sm);font-size:.8rem;color:var(--green);
}
.refresh-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:blink 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.refresh-text{flex:1}
.refresh-progress{width:80px;height:3px;background:rgba(16,185,129,.15);border-radius:2px;overflow:hidden}
.refresh-fill{height:100%;background:linear-gradient(90deg,var(--green),#34d399);border-radius:2px;transition:width 1s linear}

/* ── State Box & Animations ── */
#stateBox{animation:slideUp .35s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeScale{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

/* ── Results staggered entrance ── */
.results>*{animation:fadeScale .4s ease both}
.results>:nth-child(1){animation-delay:.05s}
.results>:nth-child(2){animation-delay:.1s}
.results>:nth-child(3){animation-delay:.15s}
.results>:nth-child(4){animation-delay:.2s}
.results>:nth-child(5){animation-delay:.25s}
.results>:nth-child(6){animation-delay:.3s}

/* ── Empty State ── */
.state-empty{text-align:center;padding:70px 20px}
.state-empty .state-icon{font-size:3.5rem;margin-bottom:14px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.state-empty p{font-size:1rem;color:var(--text3);max-width:380px;margin:0 auto;line-height:1.7}

/* ── Loading State (Skeleton) ── */
.state-loading{text-align:center;padding:50px 20px}
.spinner-ring{width:52px;height:52px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s cubic-bezier(.6,0,.4,1) infinite;margin:0 auto 18px;box-shadow:0 0 30px rgba(14,165,233,.08)}
@keyframes spin{to{transform:rotate(360deg)}}
.state-loading p{color:var(--text2);font-size:.95rem}

/* ── Error State ── */
.state-error{text-align:center;padding:36px 20px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius)}
.state-error .emoji{font-size:2.8rem;margin-bottom:10px;display:block}
.state-error p{color:#fca5a5;font-size:1rem;font-weight:600}

/* ── Status Banner ── */
.status-banner{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
  padding:18px 24px;border-radius:var(--radius);margin-bottom:20px;border:1px solid;
}
.status-banner.accepted{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25)}
.status-banner.pending{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25)}
.status-banner.rejected{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25)}
.status-label{font-size:1.2rem;font-weight:800}
.status-banner.accepted .status-label{color:var(--green)}
.status-banner.pending .status-label{color:var(--gold)}
.status-banner.rejected .status-label{color:var(--red)}
.status-meta{font-size:.82rem;color:var(--text2);margin-top:2px}
.print-btn{
  padding:8px 18px;background:var(--card2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text2);font-family:'Cairo',sans-serif;
  font-size:.82rem;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:6px;
}
.print-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,.06)}

/* ── Section Cards ── */
.section-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:18px}
.section-card{padding:20px}
.section-card h3,.interventions-section h3,.notes-section h3,.exec-section h3{
  font-size:.82rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;
  margin-bottom:16px;display:flex;align-items:center;gap:8px;
  padding-bottom:12px;border-bottom:1px solid var(--border);
}
.section-card h3 .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── Info Rows ── */
.info-row{display:flex;flex-direction:column;gap:2px;margin-bottom:14px}
.info-row:last-child{margin-bottom:0}
.info-label{font-size:.76rem;color:var(--text3);font-weight:600}
.info-value{font-size:.95rem;color:var(--text);font-weight:600;line-height:1.5}
.info-value.big{font-size:1.1rem;font-weight:800;color:var(--accent)}
.info-value.phone{direction:ltr;text-align:right;font-size:.95rem;letter-spacing:1px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:.78rem;font-weight:700}
.badge-emergency{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}

/* ── Interventions ── */
.interventions-section{padding:20px;margin-bottom:18px}
.int-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;
}
.int-item{
  padding:14px 12px;border-radius:var(--radius-sm);border:1.5px solid;
  transition:all .25s;position:relative;overflow:hidden;cursor:default;
}
.int-item:hover{transform:translateY(-2px)}
.int-item.inactive{border-color:var(--border)!important;opacity:.4}
.int-item.inactive .int-icon{filter:grayscale(1)}
.int-item.active{background:rgba(0,0,0,.15)}
.int-icon{font-size:1.4rem;margin-bottom:6px;display:block}
.int-name{font-size:.8rem;font-weight:700;color:var(--text);line-height:1.3}
.int-value{margin-top:6px;font-size:.75rem;font-weight:600;color:var(--text2);background:rgba(255,255,255,.05);border-radius:4px;padding:2px 6px;display:inline-block}
.int-check{position:absolute;top:8px;left:8px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* ── Executions Table ── */
.exec-section{padding:20px;margin-bottom:18px}
.exec-table{width:100%;border-collapse:collapse;font-size:.88rem}
.exec-table th{
  background:var(--bg2);color:var(--accent);font-weight:700;font-size:.78rem;
  padding:10px 12px;text-align:center;border-bottom:1px solid var(--border);
}
.exec-table td{
  padding:10px 12px;text-align:center;border-bottom:1px solid var(--border);
  color:var(--text);font-weight:500;transition:background .2s;
}
.exec-table tbody tr{transition:background .2s}
.exec-table tbody tr:hover{background:rgba(56,189,248,.03)}
.exec-table tbody tr:last-child td{border-bottom:none}
.exec-empty{text-align:center;padding:30px;color:var(--text3);font-size:.88rem}
.exec-badge{display:inline-block;padding:2px 12px;border-radius:100px;font-size:.76rem;font-weight:700}
.exec-badge.done{background:rgba(16,185,129,.12);color:var(--green)}
.exec-badge.pending{background:rgba(245,158,11,.12);color:var(--gold)}

/* ── Notes ── */
.notes-section{padding:20px;margin-bottom:18px}
.notes-block{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 16px;margin-bottom:10px;transition:border-color .2s;
}
.notes-block:hover{border-color:var(--border-hover)}
.notes-block:last-child{margin-bottom:0}
.notes-block-label{font-size:.76rem;color:var(--text3);font-weight:700;margin-bottom:6px}
.notes-block-text{font-size:.88rem;color:var(--text);line-height:1.7;white-space:pre-wrap}

/* ── Transfer Chips ── */
.transfer-row{display:flex;gap:10px;flex-wrap:wrap}
.transfer-chip{
  flex:1;min-width:120px;padding:14px 12px;border-radius:var(--radius-sm);text-align:center;
  font-size:.82rem;font-weight:700;transition:all .25s;
}
.transfer-chip.on{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--green)}
.transfer-chip.off{background:var(--bg2);border:1px solid var(--border);color:var(--text3)}
.transfer-chip .chip-icon{font-size:1.4rem;display:block;margin-bottom:4px}
.transfer-chip small{font-size:.7rem;font-weight:600}

/* ── Last Updated ── */
.last-updated{text-align:center;font-size:.78rem;color:var(--text3);margin-top:6px}

/* ── Toast Notification ── */
.toast-container{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;
  display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;
}
.toast{
  padding:12px 24px;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;
  font-family:'Cairo',sans-serif;box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:toastIn .3s ease;pointer-events:auto;backdrop-filter:blur(12px);
}
.toast.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ── Footer ── */
.footer{text-align:center;padding:20px 16px 10px;margin-top:16px;border-top:1px solid var(--border);font-size:.8rem;color:var(--text3);line-height:1.8}
.footer strong{color:var(--accent)}
.footer .divider{color:var(--border);margin:0 6px;opacity:.5}

/* ── Print ── */
@media print{
  body{background:#fff!important;color:#000!important}
  .bg-canvas,.grid-overlay,.mode-tabs,.search-card,.refresh-bar,.print-btn,.footer{display:none!important}
  .glass{border:1px solid #ddd!important;background:#fff!important;box-shadow:none!important;backdrop-filter:none!important}
  .int-item.inactive{display:none}
  *{color:#000!important}
}

/* ── Responsive ── */
@media(max-width:600px){
  .wrapper{padding:12px 10px 30px}
  .search-row{flex-direction:column}
  .search-btn{height:48px;justify-content:center}
  .int-grid{grid-template-columns:repeat(2,1fr)}
  .section-grid{grid-template-columns:1fr}
  .header{padding:20px 10px 20px}
  .header-logo img{height:56px}
  .status-banner{padding:14px 16px;flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>
<div class="grid-overlay"></div>

<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">
      <img src="logo.jpg" alt="صناع الحياة">
    </div>
    <h1>غرفة الاستعلامات</h1>
    <p>أدخل رقمك القومي للاستعلام عن حالتك</p>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- MODE TABS -->
  <div class="mode-tabs glass">
    <button class="mode-tab active" onclick="setMode('self')" id="tab-self">👤 مستفيد</button>
    <button class="mode-tab" onclick="setMode('staff')" id="tab-staff">🛡️ موظف</button>
  </div>

  <!-- SEARCH -->
  <div class="search-card glass">
    <div class="search-label" id="searchLabel">🪪 الرقم القومي</div>
    <div class="search-row">
      <div class="input-wrap">
        <span class="input-icon">🔢</span>
        <input id="nationalIdInput" class="national-id-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="14" placeholder="أدخل الرقم القومي 14 رقم" autocomplete="off">
      </div>
      <button class="search-btn" id="searchBtn" onclick="doSearch()"><span>🔍</span> بحث</button>
    </div>
    <div class="refresh-bar">
      <div class="refresh-dot"></div>
      <span class="refresh-text" id="refreshText">تحديث تلقائي كل دقيقتين</span>
      <div class="refresh-progress"><div class="refresh-fill" id="refreshFill" style="width:100%"></div></div>
    </div>
  </div>

  <!-- STATE -->
  <div id="stateBox">
    <div class="state-empty">
      <span class="state-icon">🔍</span>
      <p>أدخل الرقم القومي المكون من 14 رقم للبحث عن بيانات المستفيد و التدخلات و التنفيذات</p>
    </div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>

  <div class="footer">
    <strong>غرفة الاستعلامات</strong><span class="divider">|</span>إدارة الحالة — صناع الحياة المنوفية
    <br>تم التطوير بواسطة <strong>كريم شعير</strong><span class="divider">|</span>إدارة البيانات والتحول الرقمي
  </div>
</div>

<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbzB3i3uc3_jaf3N9yWXZpy32kJeNr40kO_qIzEO3h1EGDX2Vp-O10EbVli83FM1lMkCcg/exec';

let currentMode='self',lastSearchedId='',refreshInterval=null,refreshCountdown=null;
const REFRESH_SECONDS=120;let countdown=REFRESH_SECONDS;

const COLORS={
  '#10b981':{bg:'rgba(16,185,129,.12)',border:'rgba(16,185,129,.35)',check:'rgba(16,185,129,.9)'},
  '#f59e0b':{bg:'rgba(245,158,11,.12)',border:'rgba(245,158,11,.35)',check:'rgba(245,158,11,.9)'},
  '#ef4444':{bg:'rgba(239,68,68,.12)',border:'rgba(239,68,68,.35)',check:'rgba(239,68,68,.9)'},
  '#8b5cf6':{bg:'rgba(139,92,246,.12)',border:'rgba(139,92,246,.35)',check:'rgba(139,92,246,.9)'},
  '#3b82f6':{bg:'rgba(59,130,246,.12)',border:'rgba(59,130,246,.35)',check:'rgba(59,130,246,.9)'},
  '#ec4899':{bg:'rgba(236,72,153,.12)',border:'rgba(236,72,153,.35)',check:'rgba(236,72,153,.9)'},
  '#6366f1':{bg:'rgba(99,102,241,.12)',border:'rgba(99,102,241,.35)',check:'rgba(99,102,241,.9)'},
  '#14b8a6':{bg:'rgba(20,184,166,.12)',border:'rgba(20,184,166,.35)',check:'rgba(20,184,166,.9)'},
  '#f97316':{bg:'rgba(249,115,22,.12)',border:'rgba(249,115,22,.35)',check:'rgba(249,115,22,.9)'},
  '#84cc16':{bg:'rgba(132,204,22,.12)',border:'rgba(132,204,22,.35)',check:'rgba(132,204,22,.9)'},
};

function setMode(m){
  currentMode=m;
  document.getElementById('tab-self').classList.toggle('active',m==='self');
  document.getElementById('tab-staff').classList.toggle('active',m==='staff');
  document.getElementById('searchLabel').textContent=m==='self'?'🪪 الرقم القومي':'🔍 ابحث برقم المستفيد القومي';
}

function doSearch(){
  const id=document.getElementById('nationalIdInput').value.trim();
  if(!id)return showToast('أدخل الرقم القومي أولاً','error');
  if(!/^\d{14}$/.test(id))return showToast('الرقم القومي 14 رقم بالضبط','error');
  lastSearchedId=id;fetchData(id);startAutoRefresh(id);
}

document.getElementById('nationalIdInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
document.getElementById('nationalIdInput').addEventListener('input',function(){
  const btn=document.getElementById('searchBtn');
  btn.disabled=!/^\d{14}$/.test(this.value.trim());
});
document.getElementById('searchBtn').disabled=true;

async function fetchData(nationalId,silent=false){
  if(!silent)showLoading();
  try{
    const res=await fetch(`${APPS_SCRIPT_URL}?action=search&id=${encodeURIComponent(nationalId)}`);
    const json=await res.json();
    if(json.success){renderResults(json.data,json.lastUpdated)}
    else{if(!silent)showError(json.message||'لم يتم العثور على البيانات')}
  }catch(e){if(!silent)showError('تعذر الاتصال — تحقق من اتصالك بالإنترنت')}
}

function startAutoRefresh(id){
  clearInterval(refreshInterval);clearInterval(refreshCountdown);
  countdown=REFRESH_SECONDS;updateRefreshBar();
  refreshCountdown=setInterval(()=>{countdown--;if(countdown<=0)countdown=REFRESH_SECONDS;updateRefreshBar()},1000);
  refreshInterval=setInterval(()=>{if(lastSearchedId)fetchData(lastSearchedId,true);countdown=REFRESH_SECONDS},REFRESH_SECONDS*1000);
}
function updateRefreshBar(){
  const pct=(countdown/REFRESH_SECONDS)*100;
  document.getElementById('refreshFill').style.width=pct+'%';
  const m=Math.floor(countdown/60),s=countdown%60;
  document.getElementById('refreshText').textContent=`تحديث تلقائي — ${m}:${String(s).padStart(2,'0')}`;
}

function renderResults(data,lastUpdated){
  const p=data.personal,iv=data.interventions||[],ex=data.executions||[];
  const sc=getStatusClass(p.status),se=getStatusEmoji(p.status);
  const ac=iv.filter(i=>i.active).length;

  document.getElementById('stateBox').innerHTML=`<div class="results">
    <div class="status-banner ${sc}">
      <div>
        <div class="status-label">${se} ${p.status||'غير محدد'}</div>
        <div class="status-meta">🗓️ ${formatDate(p.dateOfVisit)} &nbsp;·&nbsp; 👤 ${p.volunteerName||'-'}</div>
      </div>
      <button class="print-btn" onclick="window.print()">🖨️ طباعة</button>
    </div>

    <div class="section-grid">
      <div class="section-card glass">
        <h3><span class="dot" style="background:#38bdf8"></span> البيانات الشخصية</h3>
        <div class="info-row">
          <div class="info-label">الاسم</div>
          <div class="info-value big">${p.beneficiaryName||'-'}</div>
        </div>
        <div class="info-row">
          <div class="info-label">الرقم القومي</div>
          <div class="info-value phone" style="font-weight:800;color:var(--accent)">${p.nationalId||'-'}</div>
        </div>
        ${p.emergency&&p.emergency!=='none'&&p.emergency!=='FALSE'?`
        <div class="info-row">
          <div class="info-label">الطوارئ</div>
          <div><span class="badge badge-emergency">🚨 ${p.emergency}</span></div>
        </div>`:''}
      </div>

      <div class="section-card glass">
        <h3><span class="dot" style="background:#f59e0b"></span> العنوان والأسرة</h3>
        ${p.city?`<div class="info-row"><div class="info-label">المركز</div><div class="info-value">${p.city}</div></div>`:''}
        ${p.village?`<div class="info-row"><div class="info-label">القرية</div><div class="info-value">${p.village}</div></div>`:''}
        ${p.familyMembers?`<div class="info-row"><div class="info-label">عدد أفراد الأسرة</div><div class="info-value big">${p.familyMembers}</div></div>`:''}
      </div>
    </div>

    <div class="interventions-section glass">
      <h3><span class="dot" style="background:#10b981"></span> التدخلات المقدمة
        <span style="margin-right:auto;font-size:.78rem;color:var(--green);font-weight:700;">
          ${ac} تدخل متاح
        </span>
      </h3>
      <div class="int-grid">${iv.map(i=>renderIntervention(i)).join('')}</div>
    </div>

    <div class="exec-section glass">
      <h3><span class="dot" style="background:#f59e0b"></span> التنفيذات
        <span style="margin-right:auto;font-size:.78rem;color:var(--text3);font-weight:600;">
          ${ex.length?`${ex.length} سجل`:'لا توجد تنفيذات'}
        </span>
      </h3>
      ${ex.length?`
      <table class="exec-table">
        <thead><tr><th>#</th><th>البند</th><th>التاريخ</th><th>القيمة</th><th>الحالة</th></tr></thead>
        <tbody>${ex.map((e,i)=>`
          <tr>
            <td style="color:var(--text3);font-weight:600">${i+1}</td>
            <td style="font-weight:700">${e.item||'-'}</td>
            <td>${e.date||'-'}</td>
            <td>${e.value||'-'}</td>
            <td><span class="exec-badge ${e.executed?'done':'pending'}">${e.executed?'✅ تم':'⏳ معلق'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`:`<div class="exec-empty">📋 لا توجد تنفيذات مسجلة لهذه الحالة</div>`}
    </div>

    ${(p.notes||p.notesReply)?`
    <div class="notes-section glass">
      <h3><span class="dot" style="background:#8b5cf6"></span> الملاحظات</h3>
      ${p.notes?`<div class="notes-block"><div class="notes-block-label">📝 الملاحظة</div><div class="notes-block-text">${p.notes}</div></div>`:''}
      ${p.notesReply?`<div class="notes-block"><div class="notes-block-label">💬 رد على الملاحظة</div><div class="notes-block-text">${p.notesReply}</div></div>`:''}
    </div>`:''}

    <div class="section-card glass">
      <h3><span class="dot" style="background:#6366f1"></span> مراحل التحويل</h3>
      <div class="transfer-row">
        ${transferChip('💰','تحويل للتمويل',p.transferFinance)}
        ${transferChip('📦','بدء التجميع',p.startCollection)}
        ${transferChip('⚙️','تحويل للتنفيذ',p.transferExec)}
      </div>
    </div>
  </div>`;

  document.getElementById('lastUpdated').textContent=lastUpdated?`آخر تحديث: ${lastUpdated}`:'';
}

function renderIntervention(item){
  const c=item.color||'#64748b',t=COLORS[c]||{bg:'rgba(100,116,139,.12)',border:'rgba(100,116,139,.35)',check:'gray'},on=item.active;
  return `<div class="int-item ${on?'active':'inactive'}" style="${on?`border-color:${t.border};background:${t.bg}`:''}">
    ${on?`<div class="int-check" style="background:${t.check}">✓</div>`:''}
    <span class="int-icon">${item.icon}</span>
    <div class="int-name">${item.name}</div>
    ${item.value?`<div class="int-value">${item.value}</div>`:''}
  </div>`;
}
function transferChip(icon,label,val){
  const on=(val===true||String(val).toUpperCase()==='TRUE');
  return `<div class="transfer-chip ${on?'on':'off'}"><span class="chip-icon">${icon}</span>${label}${on?'<br><small>✅ تم</small>':''}</div>`;
}

function showLoading(){
  document.getElementById('stateBox').innerHTML=`<div class="state-loading"><div class="spinner-ring"></div><p>جاري البحث في قاعدة البيانات...</p></div>`;
  document.getElementById('lastUpdated').textContent='';
}
function showError(msg){
  document.getElementById('stateBox').innerHTML=`<div class="state-error"><span class="emoji">❌</span><p>${msg}</p></div>`;
}
function showToast(msg,type='error'){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},2500);
}

function getStatusClass(s){if(!s)return'pending';const x=String(s).trim();if(x==='مقبول')return'accepted';if(x==='مرفوض')return'rejected';return'pending'}
function getStatusEmoji(s){if(!s)return'⏳';const x=String(s).trim();if(x==='مقبول')return'✅';if(x==='مرفوض')return'❌';return'⏳'}
function formatDate(d){if(!d)return'-';const dt=new Date(d);if(isNaN(dt))return d;return dt.toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'})}
</script>
</body>
</html>
